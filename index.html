<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 接口管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { background: white; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .header h1 { font-size: 22px; color: #1a1a2e; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-danger { background: #ff4757; color: white; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #eee; font-weight: 600; color: #1a1a2e; display: flex; justify-content: space-between; align-items: center; }
    .card-body { padding: 20px; }
    .api-list { max-height: 500px; overflow-y: auto; }
    .api-item { padding: 14px 16px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .api-item:hover { border-color: #667eea; }
    .api-item.active { border-color: #667eea; background: #f0f3ff; }
    .api-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .api-item-name { font-weight: 600; color: #1a1a2e; }
    .method-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .method-get { background: #e3f2fd; color: #1976d2; }
    .method-post { background: #e8f5e9; color: #388e3c; }
    .method-put { background: #fff3e0; color: #f57c00; }
    .method-delete { background: #ffebee; color: #d32f2f; }
    .api-item-url { font-size: 12px; color: #666; word-break: break-all; }
    .api-item-time { font-size: 11px; color: #999; margin-top: 6px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: 'Monaco', 'Menlo', monospace; resize: vertical; }
    .form-control:focus { outline: none; border-color: #667eea; }
    textarea.form-control { min-height: 150px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .search-input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .search-input:focus { outline: none; border-color: #667eea; }
    .detail-section { padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 12px; }
    .detail-section h4 { font-size: 12px; color: #666; margin-bottom: 8px; }
    .detail-section pre { font-size: 12px; white-space: pre-wrap; word-break: break-all; margin: 0; }
    .empty-state { text-align: center; padding: 40px; color: #999; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 14px 20px; border-radius: 8px; color: white; font-size: 14px; z-index: 1000; animation: slideIn 0.3s; }
    .toast-success { background: #2ed573; }
    .toast-error { background: #ff4757; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.2s; }
    .modal.active { opacity: 1; visibility: visible; }
    .modal-content { background: white; border-radius: 12px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 18px; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }
    .stats { display: flex; gap: 12px; margin-bottom: 20px; }
    .stat-item { background: white; padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-item .label { font-size: 12px; color: #666; }
    .stat-item .value { font-size: 24px; font-weight: 600; color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔌 API 接口管理</h1>
      <div><button class="btn btn-primary" onclick="showAddModal()">+ 新增接口</button></div>
    </div>
    <div class="stats">
      <div class="stat-item"><div class="label">总接口</div><div class="value" id="totalCount">0</div></div>
      <div class="stat-item"><div class="label">最后更新</div><div class="value" id="lastUpdate" style="font-size: 14px;">-</div></div>
    </div>
    <div class="main-grid">
      <div class="card">
        <div class="card-header"><span>接口列表</span><span id="listCount" style="font-size: 12px; color: #999;"></span></div>
        <div class="card-body">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索接口..." oninput="renderList()">
          <div class="api-list" id="apiList"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">接口详情</div>
        <div class="card-body" id="detailPanel"><div class="empty-state">选择一个接口查看详情</div></div>
      </div>
    </div>
  </div>
  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-header"><h3 id="modalTitle">新增接口</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group"><label>接口名称（可选）</label><input type="text" class="form-control" id="apiName" placeholder="如: market-overview" style="font-family: inherit;"></div>
        <div class="form-group"><label>cURL 命令</label><textarea class="form-control" id="apiCurl" placeholder="粘贴 curl 命令..."></textarea></div>
        <div class="form-group"><label>响应内容</label><textarea class="form-control" id="apiResponse" placeholder="粘贴 JSON 响应..."></textarea></div>
        <div class="form-group"><label>备注（可选）</label><textarea class="form-control" id="apiNotes" style="min-height: 60px; font-family: inherit;" placeholder="接口说明..."></textarea></div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveApi()">保存</button></div>
    </div>
  </div>
  <div class="modal" id="deleteModal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header"><h3>确认删除</h3><button class="modal-close" onclick="closeDeleteModal()">&times;</button></div>
      <div class="modal-body"><p>确定删除这个接口吗？</p></div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button><button class="btn btn-danger" onclick="confirmDelete()">删除</button></div>
    </div>
  </div>
  <script>
    let apis = [];
    let currentId = null;
    let deleteId = null;

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      return res.json();
    }

    async function loadApis() {
      try {
        const data = await api('GET', '/api/apis');
        apis = data.apis || [];
        renderList();
        updateStats();
      } catch (e) {
        showToast('加载失败', 'error');
      }
    }

    function updateStats() {
      document.getElementById('totalCount').textContent = apis.length;
      if (apis.length > 0) {
        const latest = apis.reduce((a, b) => a.updatedAt > b.updatedAt ? a : b);
        document.getElementById('lastUpdate').textContent = latest.updatedAt;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderList() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = apis.filter(a => 
        (a.name || '').toLowerCase().includes(search) ||
        (a.url || '').toLowerCase().includes(search) ||
        (a.curl || '').toLowerCase().includes(search)
      );
      document.getElementById('listCount').textContent = filtered.length + ' / ' + apis.length;
      const list = document.getElementById('apiList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无接口</div>';
        return;
      }
      list.innerHTML = filtered.map(a => {
        const method = (a.method || 'get').toLowerCase();
        return '<div class="api-item ' + (currentId === a.id ? 'active' : '') + '" data-id="' + a.id + '">' +
          '<div class="api-item-header"><span class="api-item-name">' + escapeHtml(a.name || '未命名') + '</span>' +
          '<span class="method-badge method-' + method + '">' + (a.method || 'GET') + '</span></div>' +
          '<div class="api-item-url">' + escapeHtml(a.url || '-') + '</div>' +
          '<div class="api-item-time">更新: ' + (a.updatedAt || '-') + '</div></div>';
      }).join('');

      list.querySelectorAll('.api-item').forEach(item => {
        item.addEventListener('click', () => selectApi(item.dataset.id));
      });
    }

    function selectApi(id) {
      currentId = id;
      renderList();
      const a = apis.find(x => x.id === id);
      if (!a) return;
      const method = (a.method || 'get').toLowerCase();
      document.getElementById('detailPanel').innerHTML = 
        '<div class="detail-section"><h4>接口名称</h4><pre>' + escapeHtml(a.name || '未命名') + '</pre></div>' +
        '<div class="detail-section"><h4>请求方法</h4><span class="method-badge method-' + method + '">' + (a.method || 'GET') + '</span></div>' +
        '<div class="detail-section"><h4>接口地址</h4><pre>' + escapeHtml(a.url || '-') + '</pre></div>' +
        '<div class="detail-section"><h4>cURL 命令</h4><pre>' + escapeHtml(a.curl || '-') + '</pre></div>' +
        '<div class="detail-section"><h4>响应内容</h4><pre>' + escapeHtml(a.response || '-') + '</pre></div>' +
        '<div class="detail-section"><h4>备注</h4><pre>' + escapeHtml(a.notes || '-') + '</pre></div>' +
        '<div class="detail-section"><h4>时间</h4><pre>创建: ' + (a.createdAt || '-') + ' | 更新: ' + (a.updatedAt || '-') + '</pre></div>' +
        '<div class="form-actions"><button class="btn btn-secondary" onclick="copyCurl()">复制 cURL</button><button class="btn btn-secondary" onclick="editApi()">编辑</button><button class="btn btn-danger" onclick="showDeleteModal()">删除</button></div>';
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '新增接口';
      document.getElementById('editId').value = '';
      document.getElementById('apiName').value = '';
      document.getElementById('apiCurl').value = '';
      document.getElementById('apiResponse').value = '';
      document.getElementById('apiNotes').value = '';
      document.getElementById('addModal').classList.add('active');
    }

    function editApi() {
      const a = apis.find(x => x.id === currentId);
      if (!a) return;
      document.getElementById('modalTitle').textContent = '编辑接口';
      document.getElementById('editId').value = a.id;
      document.getElementById('apiName').value = a.name || '';
      document.getElementById('apiCurl').value = a.curl || '';
      document.getElementById('apiResponse').value = a.response || '';
      document.getElementById('apiNotes').value = a.notes || '';
      document.getElementById('addModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('addModal').classList.remove('active');
    }

    async function saveApi() {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('apiName').value.trim();
      const curl = document.getElementById('apiCurl').value.trim();
      const response = document.getElementById('apiResponse').value.trim();
      const notes = document.getElementById('apiNotes').value.trim();
      if (!curl && !response) {
        showToast('请至少输入 cURL 或响应内容', 'error');
        return;
      }
      try {
        await api('POST', '/api/apis', { id, name, curl, response, notes });
        showToast('保存成功', 'success');
        closeModal();
        loadApis();
      } catch (e) {
        showToast('保存失败', 'error');
      }
    }

    function showDeleteModal() {
      deleteId = currentId;
      document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('active');
      deleteId = null;
    }

    async function confirmDelete() {
      try {
        await api('DELETE', '/api/apis/' + deleteId);
        showToast('删除成功', 'success');
        closeDeleteModal();
        loadApis();
        if (currentId === deleteId) {
          currentId = null;
          document.getElementById('detailPanel').innerHTML = '<div class="empty-state">选择一个接口查看详情</div>';
        }
      } catch (e) {
        showToast('删除失败', 'error');
      }
    }

    function copyCurl() {
      const a = apis.find(x => x.id === currentId);
      if (a && a.curl) {
        navigator.clipboard.writeText(a.curl);
        showToast('已复制', 'success');
      }
    }

    function showToast(msg, type) {
      const el = document.createElement('div');
      el.className = 'toast toast-' + type;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    loadApis();
  </script>
</body>
</html>
